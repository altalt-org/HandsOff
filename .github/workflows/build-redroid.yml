name: Build ReDroid Image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/redroid-custom
  ANDROID_VERSION: "12.0.0"

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: useblacksmith/checkout@v1

      - name: Set up Python
        uses: useblacksmith/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y lzip
          pip install -r redroid-script/requirements.txt

      - name: Run redroid-script (download + prepare files)
        working-directory: redroid-script
        run: |
          python3 redroid.py -a ${{ env.ANDROID_VERSION }} -mtg -m -l -dp -hb -ss -loc en-US,ko-KR \
            -p ro.product.model=SM-T970 \
            -p ro.product.brand=Samsung \
            -p ro.product.manufacturer=samsung \
            -p ro.product.device=gts7lwifi \
            -p ro.product.name=gts7lwifi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build and push image
        uses: useblacksmith/build-push-action@v2
        with:
          context: redroid-script
          file: redroid-script/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/arm64
