# Development compose — builds both images locally.
#
# Usage:
#   1. Prepare the ReDroid image files (downloads Magisk, GApps, etc.):
#      cd redroid-script && python redroid.py -a 12.0.0 -mtg -m -l -dp -ss -loc en-US,ko-KR && cd ..
#   2. Build and start everything:
#      docker compose -f docker-compose.dev.yml up -d --build

services:
  redroid:
    build:
      context: redroid-script
      dockerfile: Dockerfile
    privileged: true
    ports:
      - "5555:5555"
    volumes:
      - redroid-data:/data
    command:
      - androidboot.redroid_width=720
      - androidboot.redroid_height=1600
      - androidboot.redroid_dpi=320
      - androidboot.redroid_fps=24
      - androidboot.redroid_gpu_mode=guest
      - androidboot.use_memfd=1
      - ro.product.model=SM-T970
      - ro.product.brand=Samsung
      - ro.product.manufacturer=samsung
      - ro.product.device=gts7lwifi
      - ro.product.name=gts7lwifi
    restart: always

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DEVICE_SERIAL=redroid:5555
    depends_on:
      - redroid
    restart: always

  scrcpy-web:
    image: shmayro/scrcpy-web:latest
    ports:
      - "8080:8000"
    depends_on:
      - redroid
    command: >
      sh -c "adb connect redroid:5555 && npm start"
    restart: always

volumes:
  redroid-data:
