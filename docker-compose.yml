services:
  redroid:
    image: ghcr.io/altalt-org/redroid-custom:latest
    privileged: true
    ports:
      - "5555:5555"
    volumes:
      - redroid-data:/data
    command:
      - androidboot.redroid_width=1080
      - androidboot.redroid_height=2400
      - androidboot.redroid_dpi=420
      - androidboot.redroid_fps=30
      - androidboot.redroid_gpu_mode=guest
      - androidboot.use_memfd=1
      - ro.product.model=SM-T970
      - ro.product.brand=Samsung
      - ro.product.manufacturer=samsung
      - ro.product.device=gts7lwifi
      - ro.product.name=gts7lwifi

  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      - DEVICE_SERIAL=redroid:5555
    depends_on:
      - redroid
    # Wait for redroid to boot before starting
    restart: on-failure

volumes:
  redroid-data:
