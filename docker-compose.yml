services:
  redroid:
    image: ghcr.io/altalt-org/redroid-custom:latest
    privileged: true
    ports:
      - "5555:5555"
    volumes:
      - redroid-data:/data
    command:
      - androidboot.redroid_width=720
      - androidboot.redroid_height=1600
      - androidboot.redroid_dpi=320
      - androidboot.redroid_fps=24
      - androidboot.redroid_gpu_mode=guest
      - androidboot.use_memfd=1
      - ro.product.model=SM-T970
      - ro.product.brand=Samsung
      - ro.product.manufacturer=samsung
      - ro.product.device=gts7lwifi
      - ro.product.name=gts7lwifi
    restart: always

  server:
    image: ghcr.io/altalt-org/handsoff-server:latest
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DEVICE_SERIAL=redroid:5555
      - REDROID_CONTAINER=handsoff-redroid-1
    depends_on:
      - redroid
    restart: always

volumes:
  redroid-data:
